# fly.toml app configuration file generated for skribble-scrab-frontend on 2026-04-13T14:00:56+10:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'skribble-scrab'
primary_region = 'syd'

[build]
  dockerfile = "Dockerfile"
  [build.args]
    NEXT_PUBLIC_WS_BASE_URL = "wss://skribble-scrab-backend.fly.dev"
    NEXT_PUBLIC_API_BASE_URL = "https://skribble-scrab-backend.fly.dev"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = 'off'
auto_start_machines = false
min_machines_running = 1
processes = ['app']

[[vm]]
memory = '256mb'
cpus = 1
memory_mb = 256
