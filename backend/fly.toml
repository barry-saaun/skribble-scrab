# fly.toml app configuration file generated for skribble-scrab-backend on 2026-04-13T14:03:06+10:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'skribble-scrab-backend'
primary_region = 'syd'

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
